schema_version: "1.0"

extension:
  id: search
  name: "Spec Registry Search"
  version: "1.0.0"
  description: "Search and discover feature specs using the spec registry by keyword, status, tag, or relationship"
  author: patrickhportfolio
  repository: https://github.com/patrickhportfolio/spec-kit
  license: MIT

requires:
  speckit_version: ">=0.11.0"
  commands:
    - "speckit.clarify"
    - "speckit.specify"

provides:
  commands:
    - name: speckit.search.search
      file: commands/speckit.search.search.md
      description: "Search and query the spec registry by keyword, status, tag, or relationship"
      aliases: ["speckit.search"]

tags:
  - "search"
  - "registry"
  - "discovery"
  - "query"
