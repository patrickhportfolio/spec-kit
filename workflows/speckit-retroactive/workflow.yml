schema_version: "1.0"
workflow:
  id: "speckit-retroactive"
  name: "Retroactive Spec Cycle"
  version: "1.0.0"
  author: "GitHub"
  description: "Build specification artifacts for an existing feature, then optionally implement remaining work"

requires:
  speckit_version: ">=0.8.1"
  integrations:
    any: ["copilot", "claude", "gemini"]

inputs:
  feature:
    type: string
    required: true
    prompt: "Describe the existing feature to reverse-engineer a spec for"
  integration:
    type: string
    default: "copilot"
    prompt: "Integration to use (e.g. claude, copilot, gemini)"

steps:
  - id: retroactive
    command: speckit.retroactive
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.feature }}"

  - id: review-spec
    type: gate
    message: "Review the generated spec, plan, and tasks before proceeding."
    options: [approve, reject]
    on_reject: abort

  - id: clarify
    command: speckit.clarify
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.feature }}"

  - id: review-clarify
    type: gate
    message: "Review clarifications. Approve to implement, or reject to stop."
    options: [approve, reject]
    on_reject: abort

  - id: implement
    command: speckit.implement
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.feature }}"
